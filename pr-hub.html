<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PR Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', system-ui, sans-serif; background: #f8fafc; color: #1e293b; min-height: 100vh; }

        /* Gate */
        .gate { display: none; position: fixed; inset: 0; background: #f8fafc; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; z-index: 999; }
        .gate.visible { display: flex; }
        .gate-icon { font-size: 2.5rem; }
        .gate-title { font-size: 1.25rem; font-weight: 700; }
        .gate-desc { font-size: 0.9rem; color: #64748b; }
        .gate-btn { margin-top: 0.5rem; padding: 0.5rem 1.25rem; background: #1e293b; color: #fff; border: none; border-radius: 8px; font-family: inherit; font-size: 0.875rem; font-weight: 600; cursor: pointer; text-decoration: none; }

        /* Header */
        .hub-header { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 0 2rem; position: sticky; top: 0; z-index: 50; }
        .hub-header-inner { max-width: 1100px; margin: 0 auto; height: 54px; display: flex; align-items: center; justify-content: space-between; }
        .hub-header-left { display: flex; align-items: center; gap: 0.75rem; }
        .hub-back { font-size: 13px; color: #64748b; text-decoration: none; }
        .hub-back:hover { color: #1d4ed8; text-decoration: underline; }
        .hub-sep { color: #cbd5e1; }
        .hub-title { font-size: 1rem; font-weight: 700; }

        /* Main */
        .hub-main { max-width: 1100px; margin: 0 auto; padding: 1.5rem 2rem 4rem; }

        /* Stats bar */
        .hub-stats { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .hub-stat { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 0.875rem 1.25rem; flex: 1; min-width: 130px; }
        .hub-stat-num { font-size: 1.75rem; font-weight: 700; line-height: 1; }
        .hub-stat-label { font-size: 0.75rem; color: #64748b; margin-top: 0.25rem; }
        .hub-stat--done .hub-stat-num { color: #16a34a; }
        .hub-stat--progress .hub-stat-num { color: #d97706; }
        .hub-stat--new .hub-stat-num { color: #64748b; }

        /* Controls */
        .hub-controls { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
        .hub-select { padding: 0.4rem 0.7rem; border: 1px solid #e2e8f0; border-radius: 7px; font-family: inherit; font-size: 0.85rem; background: #fff; color: #1e293b; cursor: pointer; }
        .hub-add-btn { margin-left: auto; display: flex; align-items: center; gap: 0.4rem; padding: 0.45rem 1rem; background: #1e293b; color: #fff; border: none; border-radius: 8px; font-family: inherit; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
        .hub-add-btn:hover { background: #0f172a; }

        /* Section headers */
        .hub-section-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #94a3b8; margin: 1.5rem 0 0.6rem; padding-bottom: 0.4rem; border-bottom: 1px solid #f1f5f9; }

        /* Source cards */
        .hub-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; margin-bottom: 0.625rem; overflow: hidden; transition: box-shadow 0.15s; }
        .hub-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
        .hub-card-main { display: flex; align-items: flex-start; gap: 0.875rem; padding: 0.875rem 1rem; }
        .hub-card-icon { font-size: 1.25rem; flex-shrink: 0; margin-top: 1px; }
        .hub-card-body { flex: 1; min-width: 0; }
        .hub-card-title { font-size: 0.9rem; font-weight: 600; color: #1e293b; line-height: 1.35; }
        .hub-card-title a { color: inherit; text-decoration: underline; text-decoration-color: #cbd5e1; text-underline-offset: 2px; }
        .hub-card-title a:hover { color: #1d4ed8; text-decoration-color: #1d4ed8; }
        .hub-card-meta { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.3rem; align-items: center; }
        .hub-tag { font-size: 0.68rem; font-weight: 600; padding: 1px 6px; border-radius: 4px; border: 1px solid; }
        .hub-tag--paper     { color: #1d4ed8; background: #eff6ff; border-color: #bfdbfe; }
        .hub-tag--finding   { color: #7c3aed; background: #f5f3ff; border-color: #ddd6fe; }
        .hub-tag--product   { color: #0369a1; background: #f0f9ff; border-color: #bae6fd; }
        .hub-tag--project   { color: #065f46; background: #ecfdf5; border-color: #a7f3d0; }
        .hub-tag--announcement { color: #92400e; background: #fffbeb; border-color: #fde68a; }
        .hub-tag--conf      { color: #475569; background: #f8fafc; border-color: #e2e8f0; }
        .hub-tag--status    { color: #166534; background: #f0fdf4; border-color: #bbf7d0; }
        .hub-tag--status-rejected { color: #991b1b; background: #fef2f2; border-color: #fecaca; }
        .hub-priority-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .hub-priority-dot--high   { background: #ef4444; }
        .hub-priority-dot--medium { background: #f59e0b; }
        .hub-priority-dot--low    { background: #94a3b8; }

        /* Card right actions */
        .hub-card-actions { display: flex; align-items: center; gap: 0.4rem; flex-shrink: 0; }
        .hub-gen-btn { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.3rem 0.65rem; border-radius: 6px; border: 1px solid #e2e8f0; background: #f8fafc; color: #475569; font-size: 0.78rem; font-weight: 600; text-decoration: none; transition: all 0.15s; white-space: nowrap; }
        .hub-gen-btn:hover { background: #1e293b; color: #fff; border-color: #1e293b; }
        .hub-menu-btn { background: none; border: 1px solid #e2e8f0; border-radius: 6px; padding: 0.3rem 0.5rem; cursor: pointer; font-size: 14px; color: #94a3b8; }
        .hub-menu-btn:hover { background: #f1f5f9; color: #475569; }

        /* PR badges row */
        .hub-card-footer { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem 0.75rem 3.125rem; flex-wrap: wrap; }
        .hub-pr-badges { display: flex; gap: 0.35rem; align-items: center; flex-wrap: wrap; }
        .hub-pr-badge { position: relative; width: 30px; height: 30px; border-radius: 8px; border: 1.5px solid #e2e8f0; background: #f8fafc; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; padding: 0; flex-shrink: 0; }
        .hub-pr-badge:hover { border-color: #94a3b8; background: #f1f5f9; transform: scale(1.08); }
        .hub-pr-badge--done { border-color: #86efac; background: #f0fdf4; box-shadow: 0 0 0 2px #bbf7d0; }
        .hub-pr-badge--done:hover { background: #fef2f2; border-color: #fca5a5; box-shadow: 0 0 0 2px #fecaca; }
        .hub-pr-check { position: absolute; top: -5px; right: -5px; width: 12px; height: 12px; border-radius: 50%; background: #22c55e; color: #fff; font-size: 7px; font-weight: 800; display: flex; align-items: center; justify-content: center; border: 1.5px solid #fff; }
        .hub-content-btn { display: inline-flex; align-items: center; gap: 0.2rem; padding: 0.2rem 0.55rem; border-radius: 20px; border: 1px solid #e2e8f0; background: #f8fafc; color: #64748b; font-size: 0.72rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
        .hub-content-btn:hover { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
        .hub-content-btn--has { border-color: #bfdbfe; color: #1d4ed8; background: #eff6ff; }

        /* Metrics panel (inline, below card footer) */
        .hub-metrics-panel { border-top: 1px solid #f1f5f9; padding: 0.875rem 1rem 0.875rem 3.125rem; display: none; }
        .hub-metrics-panel.open { display: block; }
        .hub-metrics-header { font-size: 0.78rem; font-weight: 700; color: #475569; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
        .hub-metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem 1rem; margin-bottom: 0.75rem; }
        .hub-metrics-field { display: flex; flex-direction: column; gap: 0.2rem; }
        .hub-metrics-field label { font-size: 0.7rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.04em; }
        .hub-metrics-field input { padding: 0.35rem 0.55rem; border: 1px solid #e2e8f0; border-radius: 6px; font-family: inherit; font-size: 0.82rem; background: #f8fafc; color: #1e293b; }
        .hub-metrics-field input:focus { outline: none; border-color: #94a3b8; background: #fff; }
        .hub-metrics-full { grid-column: 1 / -1; }
        .hub-metrics-save { padding: 0.35rem 0.875rem; background: #1e293b; color: #fff; border: none; border-radius: 6px; font-family: inherit; font-size: 0.8rem; font-weight: 600; cursor: pointer; }
        .hub-metrics-save:hover { background: #0f172a; }
        .hub-metrics-unmark { padding: 0.35rem 0.875rem; background: none; border: 1px solid #e2e8f0; color: #ef4444; border-radius: 6px; font-family: inherit; font-size: 0.8rem; font-weight: 600; cursor: pointer; margin-left: 0.5rem; }
        .hub-metrics-unmark:hover { background: #fef2f2; border-color: #fca5a5; }

        /* Content modal */
        .hub-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 200; align-items: center; justify-content: center; }
        .hub-modal-overlay.open { display: flex; }
        .hub-modal { background: #fff; border-radius: 12px; width: 620px; max-width: 95vw; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .hub-modal-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem; border-bottom: 1px solid #e2e8f0; flex-shrink: 0; }
        .hub-modal-title { font-size: 0.95rem; font-weight: 700; }
        .hub-modal-close { background: none; border: none; font-size: 16px; color: #94a3b8; cursor: pointer; padding: 0.25rem; }
        .hub-modal-close:hover { color: #1e293b; }
        .hub-modal-body { padding: 1.25rem; overflow-y: auto; flex: 1; }

        /* Source form */
        .hub-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
        .hub-form-field { display: flex; flex-direction: column; gap: 0.3rem; font-size: 0.8rem; font-weight: 600; color: #64748b; }
        .hub-form-field input, .hub-form-field select, .hub-form-field textarea { padding: 0.45rem 0.65rem; border: 1px solid #e2e8f0; border-radius: 7px; font-family: inherit; font-size: 0.875rem; background: #f8fafc; color: #1e293b; }
        .hub-form-field input:focus, .hub-form-field select:focus, .hub-form-field textarea:focus { outline: none; border-color: #94a3b8; background: #fff; }
        .hub-form-field textarea { resize: vertical; min-height: 70px; }
        .hub-form-full { grid-column: 1 / -1; }
        .hub-form-actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
        .hub-btn-primary { padding: 0.45rem 1rem; background: #1e293b; color: #fff; border: none; border-radius: 7px; font-family: inherit; font-size: 0.875rem; font-weight: 600; cursor: pointer; }
        .hub-btn-primary:hover { background: #0f172a; }
        .hub-btn-secondary { padding: 0.45rem 1rem; background: none; border: 1px solid #e2e8f0; color: #475569; border-radius: 7px; font-family: inherit; font-size: 0.875rem; font-weight: 600; cursor: pointer; }
        .hub-btn-secondary:hover { background: #f8fafc; }

        /* Content viewer */
        .hub-content-tabs { display: flex; border-bottom: 1px solid #e2e8f0; margin-bottom: 1rem; }
        .hub-content-tab { padding: 0.5rem 1rem; font-size: 0.85rem; font-weight: 600; border: none; background: none; color: #64748b; cursor: pointer; border-bottom: 2px solid transparent; }
        .hub-content-tab.active { color: #1e293b; border-bottom-color: #1e293b; }
        .hub-content-text { white-space: pre-wrap; font-size: 0.875rem; line-height: 1.7; color: #334155; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 1rem; min-height: 120px; }
        .hub-copy-btn { margin-top: 0.75rem; padding: 0.35rem 0.875rem; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; font-family: inherit; font-size: 0.8rem; font-weight: 600; color: #475569; cursor: pointer; }
        .hub-copy-btn:hover { background: #e2e8f0; }
        .hub-copy-btn.copied { background: #f0fdf4; border-color: #86efac; color: #16a34a; }

        .hub-empty { text-align: center; padding: 4rem 2rem; color: #94a3b8; }
        .hub-empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
        .hub-loading { text-align: center; padding: 3rem; color: #94a3b8; }

        @media (max-width: 640px) {
            .hub-main { padding: 1rem 1rem 3rem; }
            .hub-stats { gap: 0.5rem; }
            .hub-metrics-grid { grid-template-columns: 1fr; }
            .hub-form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="gate" id="gate">
    <div class="gate-icon">🔒</div>
    <div class="gate-title">Access Restricted</div>
    <div class="gate-desc">This page is only available to admins and owners.</div>
    <a class="gate-btn" href="/pr-tool.html">← Back to PR Tool</a>
</div>

<header class="hub-header">
    <div class="hub-header-inner">
        <div class="hub-header-left">
            <a href="/pr-tool.html" class="hub-back">← PR Tool</a>
            <span class="hub-sep">|</span>
            <span class="hub-title">📊 PR Hub</span>
        </div>
    </div>
</header>

<div class="hub-main">
    <div id="statsBar" class="hub-stats" style="display:none"></div>

    <div class="hub-controls">
        <select class="hub-select" id="filterType">
            <option value="">All Types</option>
            <option value="paper">📄 Paper</option>
            <option value="finding">🔬 Research Finding</option>
            <option value="product">📦 Product</option>
            <option value="project">🚀 Project</option>
            <option value="announcement">📢 Announcement</option>
        </select>
        <select class="hub-select" id="filterStatus">
            <option value="">All Status</option>
            <option value="none">Not Started</option>
            <option value="partial">In Progress</option>
            <option value="done">All Done</option>
        </select>
        <select class="hub-select" id="filterPlatform">
            <option value="">All Platforms</option>
            <option value="linkedin">LinkedIn</option>
            <option value="x">X</option>
            <option value="rednote">Rednote</option>
            <option value="wechat">WeChat</option>
        </select>
        <button class="hub-add-btn" id="addSourceBtn">＋ Add Source</button>
    </div>

    <div id="sourceList"><div class="hub-loading">Loading…</div></div>
</div>

<!-- Source form modal -->
<div class="hub-modal-overlay" id="sourceModal">
    <div class="hub-modal">
        <div class="hub-modal-header">
            <div class="hub-modal-title" id="sourceModalTitle">Add Source</div>
            <button class="hub-modal-close" id="sourceModalClose">✕</button>
        </div>
        <div class="hub-modal-body">
            <div class="hub-form-grid">
                <div class="hub-form-field hub-form-full">
                    <label>Title *</label>
                    <input id="f-title" placeholder="e.g. HIERAMP: Coarse-to-Fine Autoregressive Amplification" />
                </div>
                <div class="hub-form-field">
                    <label>Type</label>
                    <select id="f-type">
                        <option value="paper">📄 Paper</option>
                        <option value="finding">🔬 Research Finding</option>
                        <option value="product">📦 Product</option>
                        <option value="project">🚀 Project</option>
                        <option value="announcement">📢 Announcement</option>
                    </select>
                </div>
                <div class="hub-form-field">
                    <label>Priority</label>
                    <select id="f-priority">
                        <option value="high">🔴 High</option>
                        <option value="medium" selected>🟡 Medium</option>
                        <option value="low">⚪ Low</option>
                    </select>
                </div>
                <div class="hub-form-field hub-form-full">
                    <label>Description</label>
                    <textarea id="f-description" placeholder="One-line summary for PR content generation"></textarea>
                </div>
                <div class="hub-form-field hub-form-full">
                    <label>Link (arXiv / website / etc.)</label>
                    <input id="f-link" placeholder="https://..." />
                </div>
                <div class="hub-form-field hub-form-full">
                    <label>Notes</label>
                    <input id="f-notes" placeholder="Internal notes" />
                </div>
            </div>
            <div class="hub-form-actions">
                <button class="hub-btn-primary" id="sourceModalSave">Save</button>
                <button class="hub-btn-secondary" id="sourceModalCancel">Cancel</button>
                <button class="hub-btn-secondary" id="sourceModalDelete" style="margin-left:auto;color:#ef4444;border-color:#fca5a5;display:none">Delete</button>
            </div>
        </div>
    </div>
</div>

<!-- Content viewer modal -->
<div class="hub-modal-overlay" id="contentModal">
    <div class="hub-modal">
        <div class="hub-modal-header">
            <div class="hub-modal-title" id="contentModalTitle">Saved Content</div>
            <button class="hub-modal-close" id="contentModalClose">✕</button>
        </div>
        <div class="hub-modal-body">
            <div class="hub-content-tabs">
                <button class="hub-content-tab active" data-tab="wechat">公众号</button>
                <button class="hub-content-tab" data-tab="rednote">小红书</button>
                <button class="hub-content-tab" data-tab="x">X</button>
                <button class="hub-content-tab" data-tab="linkedin">LinkedIn</button>
            </div>
            <div class="hub-content-text" id="contentText"></div>
            <button class="hub-copy-btn" id="contentCopyBtn">⎘ Copy</button>
        </div>
    </div>
</div>

<script>

    {
        key: 'wechat', label: 'WeChat (公众号)',
        svgHtml: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 0 1 .213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.295.295a.326.326 0 0 0 .167-.054l1.903-1.114a.864.864 0 0 1 .717-.098 10.16 10.16 0 0 0 2.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.446 1.703-1.415 3.882-1.98 5.853-1.838-.576-3.583-4.196-6.348-8.602-6.348zM5.785 5.991c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178A1.17 1.17 0 0 1 4.623 7.17c0-.651.52-1.18 1.162-1.18zm5.813 0c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178 1.17 1.17 0 0 1-1.162-1.178c0-.651.52-1.18 1.162-1.18zm5.34 2.867c-1.797-.052-3.746.512-5.28 1.786-1.72 1.428-2.687 3.72-1.78 6.22.942 2.453 3.666 4.229 6.884 4.229.826 0 1.622-.12 2.361-.336a.722.722 0 0 1 .598.082l1.584.926a.272.272 0 0 0 .14.047c.134 0 .24-.111.24-.247 0-.06-.023-.12-.038-.177l-.327-1.233a.582.582 0 0 1-.023-.156.49.49 0 0 1 .201-.398C23.024 18.48 24 16.82 24 14.98c0-3.21-2.931-5.837-7.064-6.122h.002zm-3.01 3.98c.535 0 .969.44.969.982a.976.976 0 0 1-.969.983.976.976 0 0 1-.969-.983c0-.542.434-.982.97-.982zm4.906 0c.535 0 .969.44.969.982a.976.976 0 0 1-.969.983.976.976 0 0 1-.969-.983c0-.542.434-.982.97-.982z" fill="#07C160"/></svg>`,
        metrics: [
            { key: 'reads', label: 'Reads', type: 'number' },
            { key: 'likes', label: 'Likes', type: 'number' },
        ],
    },
];

const TYPE_ICONS = { paper: '📄', finding: '🔬', product: '📦', project: '🚀', announcement: '📢' };

let allSources = [];   // merged: papers + prSources
let token = null;
let isElevated = false;
let editingSourceId = null;
let contentViewSource = null;
let contentViewTab = 'wechat';
let openMetricsKey = null; // "sourceId-platform"

// ── Auth ─────────────────────────────────────────────────────────────────────
async function init() {
    token = localStorage.getItem('ct_token');
    if (!token) { showGate(); return; }
    try {
        const res = await fetch(API + '/api/auth/me', { headers: { Authorization: 'Bearer ' + token } });
        if (!res.ok) { showGate(); return; }
        const user = await res.json();
        if (user.role !== 'owner' && user.role !== 'admin') { showGate(); return; }
        isElevated = true;
    } catch { showGate(); return; }
    loadData();
}

function showGate() { document.getElementById('gate').classList.add('visible'); }

// ── Data ──────────────────────────────────────────────────────────────────────
async function loadData() {
    try {
        const [papersRes, sourcesRes] = await Promise.all([
            fetch(API + '/api/papers', { headers: { Authorization: 'Bearer ' + token } }),
            fetch(API + '/api/pr-sources', { headers: { Authorization: 'Bearer ' + token } }),
        ]);
        const papers = papersRes.ok ? await papersRes.json() : [];
        const prSources = sourcesRes.ok ? await sourcesRes.json() : [];

        // Deduplicate papers by normalized title, pick first entry
        const seenTitles = new Map();
        for (const p of papers) {
            const key = (p.title || '').toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim();
            if (!seenTitles.has(key)) {
                seenTitles.set(key, {
                    _id: p.id,
                    _sourceKind: 'paper',
                    type: 'paper',
                    title: p.title || '',
                    description: [p.conferenceName, p.track !== 'Main' ? p.track : null].filter(Boolean).join(' · '),
                    link: p.link || '',
                    priority: 'medium',
                    pr: p.pr || {},
                    savedContent: p.savedContent || {},
                    notes: p.notes || '',
                    _status: p.status || '',
                    _conf: p.conferenceName || '',
                    _date: p.date || '',
                    createdAt: p.createdAt || '',
                });
            }
        }

        const paperItems = [...seenTitles.values()];
        const customItems = prSources.map(s => ({ ...s, _id: s.id, _sourceKind: 'custom' }));

        allSources = [...customItems, ...paperItems];
        render();
    } catch (err) {
        document.getElementById('sourceList').innerHTML = '<div class="hub-empty"><div class="hub-empty-icon">⚠️</div>Failed to load data.</div>';
    }
}

// ── PR status helpers ─────────────────────────────────────────────────────────
function prDate(source, platform) {
    const v = source.pr?.[platform];
    if (!v) return null;
    return typeof v === 'string' ? v : (v.date || null);
}

function prObj(source, platform) {
    const v = source.pr?.[platform];
    if (!v) return {};
    return typeof v === 'object' ? v : { date: v };
}

function platformsDone(source) {
    return PLATFORMS.filter(p => !!prDate(source, p.key)).length;
}

function prStatus(source) {
    const done = platformsDone(source);
    if (done === 0) return 'none';
    if (done === PLATFORMS.length) return 'done';
    return 'partial';
}

// ── Render ────────────────────────────────────────────────────────────────────
function applyFilters() {
    const type = document.getElementById('filterType').value;
    const status = document.getElementById('filterStatus').value;
    const platform = document.getElementById('filterPlatform').value;
    return allSources.filter(s => {
        if (type && s.type !== type) return false;
        if (status && prStatus(s) !== status) return false;
        if (platform && !prDate(s, platform)) return false;
        return true;
    });
}

function render() {
    const filtered = applyFilters();

    // Stats
    const total = allSources.length;
    const done = allSources.filter(s => prStatus(s) === 'done').length;
    const partial = allSources.filter(s => prStatus(s) === 'partial').length;
    const none = allSources.filter(s => prStatus(s) === 'none').length;
    const statsBar = document.getElementById('statsBar');
    statsBar.style.display = 'flex';
    statsBar.innerHTML = `
        <div class="hub-stat"><div class="hub-stat-num">${total}</div><div class="hub-stat-label">Total Sources</div></div>
        <div class="hub-stat hub-stat--done"><div class="hub-stat-num">${done}</div><div class="hub-stat-label">All Platforms Done</div></div>
        <div class="hub-stat hub-stat--progress"><div class="hub-stat-num">${partial}</div><div class="hub-stat-label">In Progress</div></div>
        <div class="hub-stat hub-stat--new"><div class="hub-stat-num">${none}</div><div class="hub-stat-label">Not Started</div></div>
    `;

    const list = document.getElementById('sourceList');
    if (filtered.length === 0) {
        list.innerHTML = '<div class="hub-empty"><div class="hub-empty-icon">🔍</div>No sources match the current filters.</div>';
        return;
    }

    // Group by status
    const groups = [
        { key: 'none',    label: '⭕ Not Started',       items: filtered.filter(s => prStatus(s) === 'none') },
        { key: 'partial', label: '🔄 In Progress',        items: filtered.filter(s => prStatus(s) === 'partial') },
        { key: 'done',    label: '✅ All Platforms Done', items: filtered.filter(s => prStatus(s) === 'done') },
    ].filter(g => g.items.length > 0);

    list.innerHTML = groups.map(g => `
        <div class="hub-section-title">${g.label} (${g.items.length})</div>
        ${g.items.map(s => renderCard(s)).join('')}
    `).join('');

    // Attach event handlers
    list.querySelectorAll('[data-toggle-platform]').forEach(btn => {
        btn.addEventListener('click', () => {
            const sid = btn.dataset.sid;
            const platform = btn.dataset.togglePlatform;
            const source = allSources.find(s => s._id === sid);
            if (!source) return;
            const key = sid + '-' + platform;
            if (openMetricsKey === key) { closeMetricsPanel(key); return; }
            if (openMetricsKey) closeMetricsPanel(openMetricsKey);
            openMetricsKey = key;
            openMetricsPanel(source, platform);
        });
    });

    list.querySelectorAll('[data-show-content]').forEach(btn => {
        btn.addEventListener('click', () => {
            const sid = btn.dataset.showContent;
            const source = allSources.find(s => s._id === sid);
            if (source) openContentModal(source);
        });
    });

    if (isElevated) {
        list.querySelectorAll('[data-edit-source]').forEach(btn => {
            btn.addEventListener('click', () => {
                const sid = btn.dataset.editSource;
                const source = allSources.find(s => s._id === sid);
                if (source && source._sourceKind === 'custom') openSourceModal(source);
            });
        });
    }
}

function renderCard(source) {
    const statusTag = source._status
        ? `<span class="hub-tag hub-tag--${source._status === 'rejected' ? 'status-rejected' : 'status'}">${source._status}</span>`
        : '';
    const dateTag = source._date
        ? `<span class="hub-tag hub-tag--conf">${source._date}</span>` : '';
    const confTag = source._conf
        ? `<span class="hub-tag hub-tag--conf">${source._conf}</span>` : '';
    const typeDescTag = source.description && !source._conf
        ? `<span class="hub-tag hub-tag--conf">${source.description}</span>` : '';

    const titleHtml = source.link
        ? `<a href="${source.link}" target="_blank" rel="noopener noreferrer">${escHtml(source.title)}</a>`
        : escHtml(source.title);

    const hasSavedContent = Object.values(source.savedContent || {}).some(v => v && v.trim());
    const contentBtnClass = hasSavedContent ? 'hub-content-btn hub-content-btn--has' : 'hub-content-btn';
    const contentBtnLabel = hasSavedContent ? '📋 View Content' : '📋 No Content';

    const genUrl = `/matrix-publishing.html?title=${encodeURIComponent(source.title)}&link=${encodeURIComponent(source.link || '')}&sourceId=${encodeURIComponent(source._id)}&sourceKind=${encodeURIComponent(source._sourceKind)}`;

    const editBtn = (isElevated && source._sourceKind === 'custom')
        ? `<button class="hub-menu-btn" data-edit-source="${source._id}" title="Edit source">⋯</button>` : '';

    const badgesHtml = PLATFORMS.map(p => {
        const date = prDate(source, p.key);
        const doneClass = date ? ' hub-pr-badge--done' : '';
        const checkHtml = date ? '<span class="hub-pr-check">✓</span>' : '';
        const titleAttr = date ? `${p.label}: Done on ${date}` : `${p.label}: click to mark done`;
        return `<button class="hub-pr-badge${doneClass}" data-toggle-platform="${p.key}" data-sid="${source._id}" title="${titleAttr}">${p.svgHtml}${checkHtml}</button>`;
    }).join('');

    return `
    <div class="hub-card" id="card-${source._id}">
        <div class="hub-card-main">
            <div class="hub-card-icon">${TYPE_ICONS[source.type] || '📌'}</div>
            <div class="hub-card-body">
                <div class="hub-card-title">${titleHtml}</div>
                <div class="hub-card-meta">
                    <span class="hub-priority-dot hub-priority-dot--${source.priority || 'medium'}"></span>
                    <span class="hub-tag hub-tag--${source.type}">${source.type}</span>
                    ${confTag}${dateTag}${typeDescTag}${statusTag}
                </div>
            </div>
            <div class="hub-card-actions">
                <a class="hub-gen-btn" href="${genUrl}" target="_blank" rel="noopener noreferrer">✨ Generate</a>
                <button class="${contentBtnClass}" data-show-content="${source._id}">${contentBtnLabel}</button>
                ${editBtn}
            </div>
        </div>
        <div class="hub-card-footer">
            <div class="hub-pr-badges">${badgesHtml}</div>
        </div>
        <div class="hub-metrics-panel" id="metrics-panel-${source._id}"></div>
    </div>`;
}

// ── Metrics panel ─────────────────────────────────────────────────────────────
function openMetricsPanel(source, platform) {
    const panelEl = document.getElementById(`metrics-panel-${source._id}`);
    if (!panelEl) return;
    const p = PLATFORMS.find(pl => pl.key === platform);
    if (!p) return;
    const existing = prObj(source, platform);
    const isNewMark = !prDate(source, platform);

    const metricsFields = p.metrics.map(m => `
        <div class="hub-metrics-field">
            <label>${m.label}</label>
            <input type="${m.type}" id="mf-${source._id}-${platform}-${m.key}"
                value="${existing[m.key] ?? ''}" placeholder="—" />
        </div>`).join('');

    panelEl.innerHTML = `
        <div class="hub-metrics-header">
            ${p.svgHtml} <span>${p.label}</span>
            ${existing.date ? `<span style="color:#64748b;font-weight:400;">· Published ${existing.date}</span>` : ''}
        </div>
        <div class="hub-metrics-grid">
            <div class="hub-metrics-field">
                <label>Publish Date</label>
                <input type="date" id="mf-${source._id}-${platform}-date" value="${existing.date || new Date().toISOString().slice(0,10)}" />
            </div>
            <div class="hub-metrics-field">
                <label>Post URL</label>
                <input type="url" id="mf-${source._id}-${platform}-postUrl" value="${existing.postUrl || ''}" placeholder="https://…" />
            </div>
            ${metricsFields}
        </div>
        <div>
            <button class="hub-metrics-save" id="mf-save-${source._id}-${platform}">Save</button>
            ${!isNewMark ? `<button class="hub-metrics-unmark" id="mf-unmark-${source._id}-${platform}">Unmark</button>` : ''}
        </div>`;
    panelEl.classList.add('open');

    document.getElementById(`mf-save-${source._id}-${platform}`)?.addEventListener('click', () => saveMetrics(source, platform, p));
    document.getElementById(`mf-unmark-${source._id}-${platform}`)?.addEventListener('click', () => unmarkPlatform(source, platform));
}

function closeMetricsPanel(key) {
    const [sid] = key.split('-');
    const source = allSources.find(s => s._id === sid || key.startsWith(s._id + '-'));
    if (!source) return;
    const panelEl = document.getElementById(`metrics-panel-${source._id}`);
    if (panelEl) { panelEl.classList.remove('open'); panelEl.innerHTML = ''; }
    openMetricsKey = null;
}

async function saveMetrics(source, platform, platformDef) {
    const date = document.getElementById(`mf-${source._id}-${platform}-date`)?.value || null;
    const postUrl = document.getElementById(`mf-${source._id}-${platform}-postUrl`)?.value || null;
    const metrics = {};
    platformDef.metrics.forEach(m => {
        const val = document.getElementById(`mf-${source._id}-${platform}-${m.key}`)?.value;
        metrics[m.key] = val !== '' && val != null ? Number(val) : null;
    });
    const newPlatformData = { date, postUrl: postUrl || null, ...metrics };
    const newPr = { ...(source.pr || {}), [platform]: newPlatformData };
    await persistPr(source, newPr);
}

async function unmarkPlatform(source, platform) {
    const existing = prObj(source, platform);
    const newPlatformData = { ...existing, date: null };
    const newPr = { ...(source.pr || {}), [platform]: newPlatformData };
    await persistPr(source, newPr);
}

async function persistPr(source, newPr) {
    try {
        if (source._sourceKind === 'paper') {
            await fetch(`${API}/api/papers/${source._id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
                body: JSON.stringify({ ...source, pr: newPr }),
            });
        } else {
            await fetch(`${API}/api/pr-sources/${source._id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
                body: JSON.stringify({ ...source, pr: newPr }),
            });
        }
        source.pr = newPr;
        openMetricsKey = null;
        render();
    } catch { alert('Failed to save. Please try again.'); }
}

// ── Content modal ─────────────────────────────────────────────────────────────
function openContentModal(source) {
    contentViewSource = source;
    contentViewTab = 'wechat';
    document.getElementById('contentModalTitle').textContent = source.title.slice(0, 60) + (source.title.length > 60 ? '…' : '');
    document.querySelectorAll('.hub-content-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === contentViewTab));
    updateContentView();
    document.getElementById('contentModal').classList.add('open');
}

function updateContentView() {
    const text = contentViewSource?.savedContent?.[contentViewTab] || '';
    document.getElementById('contentText').textContent = text || '(No content saved for this platform)';
}

document.querySelectorAll('.hub-content-tab').forEach(tab => {
    tab.addEventListener('click', () => {
        contentViewTab = tab.dataset.tab;
        document.querySelectorAll('.hub-content-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === contentViewTab));
        updateContentView();
    });
});

document.getElementById('contentModalClose').addEventListener('click', () => {
    document.getElementById('contentModal').classList.remove('open');
});

document.getElementById('contentCopyBtn').addEventListener('click', function() {
    const text = document.getElementById('contentText').textContent;
    navigator.clipboard.writeText(text).then(() => {
        this.textContent = '✓ Copied';
        this.classList.add('copied');
        setTimeout(() => { this.textContent = '⎘ Copy'; this.classList.remove('copied'); }, 2000);
    });
});

// ── Source modal ──────────────────────────────────────────────────────────────
document.getElementById('addSourceBtn').addEventListener('click', () => openSourceModal(null));
document.getElementById('sourceModalCancel').addEventListener('click', closeSourceModal);
document.getElementById('sourceModalClose').addEventListener('click', closeSourceModal);

function openSourceModal(source) {
    editingSourceId = source ? source._id : null;
    document.getElementById('sourceModalTitle').textContent = source ? 'Edit Source' : 'Add Source';
    document.getElementById('f-title').value = source?.title || '';
    document.getElementById('f-type').value = source?.type || 'announcement';
    document.getElementById('f-priority').value = source?.priority || 'medium';
    document.getElementById('f-description').value = source?.description || '';
    document.getElementById('f-link').value = source?.link || '';
    document.getElementById('f-notes').value = source?.notes || '';
    document.getElementById('sourceModalDelete').style.display = source ? 'inline-block' : 'none';
    document.getElementById('sourceModal').classList.add('open');
}

function closeSourceModal() { document.getElementById('sourceModal').classList.remove('open'); editingSourceId = null; }

document.getElementById('sourceModalSave').addEventListener('click', async () => {
    const title = document.getElementById('f-title').value.trim();
    if (!title) { alert('Title is required.'); return; }
    const body = {
        title,
        type: document.getElementById('f-type').value,
        priority: document.getElementById('f-priority').value,
        description: document.getElementById('f-description').value.trim(),
        link: document.getElementById('f-link').value.trim(),
        notes: document.getElementById('f-notes').value.trim(),
    };
    try {
        if (editingSourceId) {
            const res = await fetch(`${API}/api/pr-sources/${editingSourceId}`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
                body: JSON.stringify(body),
            });
            if (!res.ok) throw new Error();
        } else {
            const res = await fetch(`${API}/api/pr-sources`, {
                method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
                body: JSON.stringify(body),
            });
            if (!res.ok) throw new Error();
        }
        closeSourceModal();
        loadData();
    } catch { alert('Failed to save source.'); }
});

document.getElementById('sourceModalDelete').addEventListener('click', async () => {
    if (!editingSourceId || !confirm('Delete this source?')) return;
    try {
        await fetch(`${API}/api/pr-sources/${editingSourceId}`, {
            method: 'DELETE', headers: { Authorization: 'Bearer ' + token },
        });
        closeSourceModal();
        loadData();
    } catch { alert('Failed to delete.'); }
});

// Close modals on overlay click
document.getElementById('sourceModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeSourceModal(); });
document.getElementById('contentModal').addEventListener('click', e => { if (e.target === e.currentTarget) document.getElementById('contentModal').classList.remove('open'); });

// Filters
['filterType', 'filterStatus', 'filterPlatform'].forEach(id => {
    document.getElementById(id).addEventListener('change', render);
});

// ── Util ──────────────────────────────────────────────────────────────────────
function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
