<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DAM · Asset Library</title>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            font-family: 'Inter', system-ui, sans-serif;
            background: #f8fafc;
            color: #1e293b;
        }

        .dam-page {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ── Header ── */
        .dam-header {
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            padding: 0 1.5rem;
            flex-shrink: 0;
        }
        .dam-header-inner {
            max-width: 1200px;
            margin: 0 auto;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }
        .dam-header-left { display: flex; align-items: center; gap: 0.75rem; }
        .dam-back { font-size: 13px; color: #64748b; text-decoration: none; }
        .dam-back:hover { color: #1d4ed8; text-decoration: underline; }
        .dam-sep { color: #cbd5e1; }
        .dam-header-title { font-size: 1rem; font-weight: 700; color: #1e293b; }

        .dam-account-pill {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.2rem 0.625rem;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: #fff;
        }
        .dam-account-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: rgba(255,255,255,0.6);
        }

        /* Search */
        .dam-search {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 0.35rem 0.75rem;
            min-width: 220px;
        }
        .dam-search input {
            border: none;
            background: none;
            outline: none;
            font-family: inherit;
            font-size: 0.85rem;
            color: #1e293b;
            width: 100%;
        }
        .dam-search input::placeholder { color: #94a3b8; }
        .dam-search-icon { color: #94a3b8; font-size: 13px; }

        /* Upload btn */
        .dam-upload-btn {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.875rem;
            background: #1e293b;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }
        .dam-upload-btn:hover { background: #0f172a; }

        /* ── Body ── */
        .dam-body {
            display: flex;
            flex: 1;
            overflow: hidden;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        /* ── Sidebar ── */
        .dam-sidebar {
            width: 220px;
            flex-shrink: 0;
            border-right: 1px solid #e2e8f0;
            background: #fff;
            padding: 1rem 0;
            overflow-y: auto;
        }
        .dam-sidebar-label {
            padding: 0 1rem 0.4rem;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #94a3b8;
        }
        .dam-folder {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.45rem 1rem;
            font-size: 0.875rem;
            color: #475569;
            cursor: pointer;
            border-left: 2px solid transparent;
            transition: background 0.1s;
        }
        .dam-folder:hover { background: #f8fafc; }
        .dam-folder.active {
            background: #eff6ff;
            color: #1d4ed8;
            border-left-color: #1d4ed8;
            font-weight: 600;
        }
        .dam-folder-icon { font-size: 15px; }
        .dam-folder-count {
            margin-left: auto;
            font-size: 11px;
            background: #f1f5f9;
            color: #64748b;
            padding: 1px 6px;
            border-radius: 10px;
        }
        .dam-folder.active .dam-folder-count {
            background: #dbeafe;
            color: #1d4ed8;
        }

        /* ── Main ── */
        .dam-main {
            flex: 1;
            overflow-y: auto;
            padding: 1.25rem 1.5rem;
        }

        .dam-breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 13px;
            color: #64748b;
            margin-bottom: 1.25rem;
        }
        .dam-breadcrumb a { color: #1d4ed8; text-decoration: none; }
        .dam-breadcrumb a:hover { text-decoration: underline; }
        .dam-breadcrumb-sep { color: #cbd5e1; }

        .dam-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }
        .dam-count { font-size: 13px; color: #64748b; }
        .dam-view-btns { display: flex; gap: 0.25rem; }
        .dam-view-btn {
            padding: 0.3rem 0.5rem;
            border: 1px solid #e2e8f0;
            background: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: #64748b;
        }
        .dam-view-btn.active { background: #1e293b; color: #fff; border-color: #1e293b; }

        /* Asset grid */
        .dam-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1rem;
        }

        .dam-asset {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: box-shadow 0.2s, border-color 0.2s;
        }
        .dam-asset:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            border-color: #cbd5e1;
        }
        .dam-asset-thumb {
            width: 100%;
            aspect-ratio: 4/3;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-bottom: 1px solid #f1f5f9;
        }
        .dam-asset-thumb img {
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
        }
        .dam-asset-info {
            padding: 0.625rem 0.75rem;
        }
        .dam-asset-name {
            font-size: 0.8rem;
            font-weight: 600;
            color: #1e293b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0.3rem;
        }
        .dam-asset-meta {
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }
        .dam-asset-type {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 1px 6px;
            border-radius: 4px;
            background: #f1f5f9;
            color: #64748b;
        }
        .dam-asset-account {
            font-size: 10px;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 4px;
            color: #fff;
        }

        /* Download button */
        .dam-asset-actions {
            display: flex;
            justify-content: flex-end;
            padding: 0 0.75rem 0.625rem;
        }
        .dam-download-btn {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.25rem 0.6rem;
            font-size: 11px;
            font-weight: 600;
            color: #475569;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        .dam-download-btn:hover { background: #e2e8f0; color: #1e293b; }

        /* Auth gate */
        .dam-gate {
            display: none;
            position: fixed;
            inset: 0;
            background: #f8fafc;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
            z-index: 999;
        }
        .dam-gate.visible { display: flex; }
        .dam-gate-icon { font-size: 2.5rem; }
        .dam-gate-title { font-size: 1.25rem; font-weight: 700; }
        .dam-gate-desc { font-size: 0.9rem; color: #64748b; }
        .dam-gate-btn {
            margin-top: 0.5rem;
            padding: 0.5rem 1.25rem;
            background: #1e293b;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="dam-page">

    <!-- Auth gate -->
    <div class="dam-gate" id="damGate">
        <div class="dam-gate-icon">🔒</div>
        <div class="dam-gate-title">Access Restricted</div>
        <div class="dam-gate-desc">This page is only available to admins and owners.</div>
        <a class="dam-gate-btn" href="/pr-tool.html">← Back to PR Tool</a>
    </div>

    <!-- Header -->
    <header class="dam-header">
        <div class="dam-header-inner">
            <div class="dam-header-left">
                <a href="/pr-tool.html" class="dam-back">← PR Tool</a>
                <span class="dam-sep">|</span>
                <span class="dam-header-title">🗂️ DAM · Asset Library</span>
                <span class="dam-account-pill" id="accountPill">
                    <span class="dam-account-dot"></span>
                    <span id="accountPillName">Yanzhiwang</span>
                </span>
            </div>
            <div class="dam-header-left" style="gap:0.75rem">
                <div class="dam-search">
                    <span class="dam-search-icon">🔍</span>
                    <input type="text" placeholder="Search assets…" />
                </div>
                <button class="dam-upload-btn" id="uploadBtn">＋ Upload</button>
                <input type="file" id="fileInput" accept="image/*,video/*,.pdf,.doc,.docx" multiple style="display:none" />
            </div>
        </div>
    </header>

    <!-- Body -->
    <div class="dam-body">

        <!-- Sidebar -->
        <nav class="dam-sidebar">
            <div class="dam-sidebar-label">Folders</div>
            <div class="dam-folder active" data-folder="logo">
                <span class="dam-folder-icon">📁</span>
                Logo
                <span class="dam-folder-count">2</span>
            </div>
        </nav>

        <!-- Main -->
        <main class="dam-main">
            <div class="dam-breadcrumb">
                <span>All Assets</span>
                <span class="dam-breadcrumb-sep">›</span>
                <span>Logo</span>
            </div>
            <div class="dam-toolbar">
                <span class="dam-count" id="assetCount">2 assets</span>
                <div class="dam-view-btns">
                    <button class="dam-view-btn active">⊞</button>
                    <button class="dam-view-btn">☰</button>
                </div>
            </div>
            <div class="dam-grid">
                <div class="dam-asset">
                    <a href="/dam/logo/aibao-logo.PNG" target="_blank" rel="noopener noreferrer">
                        <div class="dam-asset-thumb">
                            <img src="/dam/logo/aibao-logo.PNG" alt="AIBao Logo" />
                        </div>
                    </a>
                    <div class="dam-asset-info">
                        <div class="dam-asset-name">aibao-logo.PNG</div>
                        <div class="dam-asset-meta">
                            <span class="dam-asset-type">PNG</span>
                            <span class="dam-asset-account" style="background:#1d4ed8;">Yanzhiwang</span>
                        </div>
                    </div>
                    <div class="dam-asset-actions">
                        <a class="dam-download-btn" href="/dam/logo/aibao-logo.PNG" download="aibao-logo.PNG">⬇ Download</a>
                    </div>
                </div>
                <div class="dam-asset">
                    <a href="/dam/logo/embodyx-logo.PNG" target="_blank" rel="noopener noreferrer">
                        <div class="dam-asset-thumb">
                            <img src="/dam/logo/embodyx-logo.PNG" alt="EmbodyX Logo" />
                        </div>
                    </a>
                    <div class="dam-asset-info">
                        <div class="dam-asset-name">embodyx-logo.PNG</div>
                        <div class="dam-asset-meta">
                            <span class="dam-asset-type">PNG</span>
                            <span class="dam-asset-account" style="background:#7c3aed;">EmbodyX</span>
                        </div>
                    </div>
                    <div class="dam-asset-actions">
                        <a class="dam-download-btn" href="/dam/logo/embodyx-logo.PNG" download="embodyx-logo.PNG">⬇ Download</a>
                    </div>
                </div>
            </div>
        </main>

    </div>
</div>

<script>
    const API = 'https://conference-tracker-production.up.railway.app';
    const ACCOUNTS = {
        yanzhiwang: { name: 'Yanzhiwang', color: '#1d4ed8' },
        embodyx:    { name: 'EmbodyX',    color: '#7c3aed' },
    };

    async function checkAccess() {
        const token = localStorage.getItem('ct_token');
        if (!token) { showGate(); return; }
        try {
            const res = await fetch(API + '/api/auth/me', {
                headers: { Authorization: 'Bearer ' + token }
            });
            if (!res.ok) { showGate(); return; }
            const user = await res.json();
            if (user.role !== 'owner' && user.role !== 'admin') { showGate(); return; }
        } catch { showGate(); return; }

        // Apply account context
        const accKey = localStorage.getItem('pr_account') || 'yanzhiwang';
        const acc = ACCOUNTS[accKey] || ACCOUNTS.yanzhiwang;
        document.getElementById('accountPillName').textContent = acc.name;
        document.getElementById('accountPill').style.background = acc.color;
    }

    function showGate() {
        document.getElementById('damGate').classList.add('visible');
    }

    checkAccess();

    // Upload
    document.getElementById('uploadBtn').addEventListener('click', () => {
        document.getElementById('fileInput').click();
    });

    document.getElementById('fileInput').addEventListener('change', (e) => {
        const files = Array.from(e.target.files);
        const grid = document.querySelector('.dam-grid');
        const accKey = localStorage.getItem('pr_account') || 'yanzhiwang';
        const acc = ACCOUNTS[accKey] || ACCOUNTS.yanzhiwang;

        files.forEach(file => {
            const url = URL.createObjectURL(file);
            const ext = file.name.split('.').pop().toUpperCase();
            const isImage = file.type.startsWith('image/');

            const card = document.createElement('div');
            card.className = 'dam-asset';
            card.innerHTML = `
                <a href="${url}" target="_blank" rel="noopener noreferrer">
                    <div class="dam-asset-thumb">
                        ${isImage ? `<img src="${url}" alt="${file.name}" />` : `<span style="font-size:2rem">📄</span>`}
                    </div>
                </a>
                <div class="dam-asset-info">
                    <div class="dam-asset-name">${file.name}</div>
                    <div class="dam-asset-meta">
                        <span class="dam-asset-type">${ext}</span>
                        <span class="dam-asset-account" style="background:${acc.color}">${acc.name}</span>
                    </div>
                </div>
                <div class="dam-asset-actions">
                    <a class="dam-download-btn" href="${url}" download="${file.name}">⬇ Download</a>
                </div>
            `;
            grid.appendChild(card);
        });

        // Update count
        const total = grid.querySelectorAll('.dam-asset').length;
        document.getElementById('assetCount').textContent = `${total} assets`;
        e.target.value = '';
    });
</script>
</body>
</html>
