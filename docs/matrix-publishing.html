<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matrix Publishing</title>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
        }

        /* Header */
        .mp-header {
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            padding: 0 2rem;
            position: sticky; top: 0; z-index: 50;
        }
        .mp-header-inner {
            max-width: 1200px;
            margin: 0 auto;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .mp-header-left { display: flex; align-items: center; gap: 0.75rem; }
        .mp-back { font-size: 13px; color: #64748b; text-decoration: none; }
        .mp-back:hover { color: #1d4ed8; text-decoration: underline; }
        .mp-sep { color: #cbd5e1; }
        .mp-header-title { font-size: 1rem; font-weight: 700; }
        .mp-account-pill {
            display: flex; align-items: center; gap: 0.4rem;
            padding: 0.2rem 0.625rem; border-radius: 20px;
            font-size: 12px; font-weight: 600; color: #fff;
        }

        /* Main */
        .mp-main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem 2rem 3rem;
        }

        /* Input section */
        .mp-input-section {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
        }
        .mp-input-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 0.625rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .mp-textarea {
            width: 100%;
            min-height: 160px;
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.875rem;
            color: #1e293b;
            background: #f8fafc;
            resize: vertical;
            outline: none;
            line-height: 1.6;
        }
        .mp-textarea:focus { border-color: #94a3b8; background: #fff; }
        .mp-textarea::placeholder { color: #94a3b8; }
        .mp-input-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 0.75rem;
        }
        .mp-char-count { font-size: 12px; color: #94a3b8; }
        .mp-generate-btn {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.55rem 1.25rem;
            background: #1e293b; color: #fff;
            border: none; border-radius: 8px;
            font-family: inherit; font-size: 0.875rem; font-weight: 600;
            cursor: pointer; transition: background 0.15s;
        }
        .mp-generate-btn:hover { background: #0f172a; }
        .mp-generate-btn:disabled { background: #94a3b8; cursor: not-allowed; }
        .mp-spinner {
            width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Output grid */
        .mp-output { display: none; }
        .mp-output.visible { display: block; }

        .mp-output-title {
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #94a3b8;
            margin-bottom: 0.875rem;
        }

        .mp-top-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
            margin-bottom: 1.25rem;
        }

        .mp-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
        }
        .mp-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.875rem 1rem;
            border-bottom: 1px solid #f1f5f9;
        }
        .mp-card-platform {
            display: flex; align-items: center; gap: 0.5rem;
            font-size: 0.875rem; font-weight: 700;
        }
        .mp-platform-icon {
            width: 28px; height: 28px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px;
        }
        .mp-copy-btn {
            display: flex; align-items: center; gap: 0.3rem;
            padding: 0.25rem 0.625rem;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            background: #f8fafc;
            font-family: inherit; font-size: 11px; font-weight: 600;
            color: #64748b; cursor: pointer; transition: all 0.15s;
        }
        .mp-copy-btn:hover { background: #e2e8f0; color: #1e293b; }
        .mp-copy-btn.copied { background: #f0fdf4; border-color: #86efac; color: #166534; }
        .mp-card-body {
            padding: 1rem;
            font-size: 0.875rem;
            line-height: 1.75;
            color: #334155;
            white-space: pre-wrap;
            min-height: 180px;
        }
        .mp-char-info {
            padding: 0.5rem 1rem;
            border-top: 1px solid #f1f5f9;
            font-size: 11px;
            color: #94a3b8;
            text-align: right;
        }

        /* Image upload */
        .mp-img-section {
            border-top: 1px solid #f1f5f9;
            padding: 0.875rem 1.25rem;
        }
        .mp-img-label {
            font-size: 0.82rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 0.625rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .mp-img-upload-btn {
            display: inline-flex; align-items: center; gap: 0.35rem;
            padding: 0.3rem 0.75rem;
            border: 1px dashed #94a3b8;
            border-radius: 6px;
            background: #f8fafc;
            font-family: inherit; font-size: 12px; font-weight: 600;
            color: #64748b; cursor: pointer; transition: all 0.15s;
        }
        .mp-img-upload-btn:hover { background: #e2e8f0; border-color: #64748b; color: #1e293b; }
        .mp-img-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .mp-img-thumb {
            position: relative;
            width: 72px; height: 72px;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            flex-shrink: 0;
        }
        .mp-img-thumb img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .mp-img-remove {
            position: absolute; top: 2px; right: 2px;
            width: 16px; height: 16px;
            background: rgba(0,0,0,0.55); color: #fff;
            border: none; border-radius: 50%;
            font-size: 10px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            line-height: 1;
        }
        .mp-img-remove:hover { background: rgba(220,38,38,0.85); }
        .mp-img-add {
            width: 72px; height: 72px;
            border: 1px dashed #cbd5e1;
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 22px; color: #94a3b8;
            transition: all 0.15s; flex-shrink: 0;
        }
        .mp-img-add:hover { border-color: #64748b; color: #475569; background: #f1f5f9; }

        /* Images inside output cards */
        .mp-card-images {
            display: none;
            padding: 0.75rem 1rem 0;
            gap: 0.375rem;
            flex-wrap: wrap;
        }
        .mp-card-images.has-images { display: flex; }
        .mp-card-img-thumb {
            width: 60px; height: 60px;
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            flex-shrink: 0;
        }
        .mp-card-img-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .mp-card-img-count {
            font-size: 11px; color: #94a3b8;
            padding: 0 1rem 0.5rem;
        }

        /* Platform colors */
        .platform--wechat .mp-platform-icon { background: #f0fdf4; }
        .platform--rednote .mp-platform-icon { background: #fff1f2; }
        .platform--x .mp-platform-icon { background: #f8fafc; }
        .platform--wechat .mp-card-header { border-left: 3px solid #22c55e; }
        .platform--rednote .mp-card-header { border-left: 3px solid #f43f5e; }
        .platform--x .mp-card-header { border-left: 3px solid #1e293b; }

        /* Auth gate */
        .mp-gate {
            display: none; position: fixed; inset: 0;
            background: #f8fafc;
            align-items: center; justify-content: center;
            flex-direction: column; gap: 1rem; z-index: 999;
        }
        .mp-gate.visible { display: flex; }
        .mp-gate-icon { font-size: 2.5rem; }
        .mp-gate-title { font-size: 1.25rem; font-weight: 700; }
        .mp-gate-desc { font-size: 0.9rem; color: #64748b; }
        .mp-gate-btn {
            margin-top: 0.5rem; padding: 0.5rem 1.25rem;
            background: #1e293b; color: #fff; border: none;
            border-radius: 8px; font-family: inherit;
            font-size: 0.875rem; font-weight: 600;
            cursor: pointer; text-decoration: none;
        }

        @media (max-width: 700px) {
            .mp-top-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="mp-gate" id="mpGate">
        <div class="mp-gate-icon">🔒</div>
        <div class="mp-gate-title">Access Restricted</div>
        <div class="mp-gate-desc">This page is only available to admins and owners.</div>
        <a class="mp-gate-btn" href="/pr-tool.html">← Back to PR Tool</a>
    </div>

    <header class="mp-header">
        <div class="mp-header-inner">
            <div class="mp-header-left">
                <a href="/pr-tool.html" class="mp-back">← PR Tool</a>
                <span class="mp-sep">|</span>
                <span class="mp-header-title">🔄 Matrix Publishing</span>
                <span class="mp-account-pill" id="accountPill">
                    <span id="accountPillName">Yanzhiwang</span>
                </span>
            </div>
        </div>
    </header>

    <div class="mp-main">

        <!-- Input -->
        <div class="mp-input-section">
            <div class="mp-input-label">📝 Paste your PR article</div>
            <textarea class="mp-textarea" id="articleInput"
                placeholder="Paste your original PR article or press release here. AI will adapt it for 公众号, 小红书, and X automatically…"></textarea>
            <div class="mp-input-footer">
                <span class="mp-char-count" id="charCount">0 characters</span>
                <button class="mp-generate-btn" id="generateBtn">
                    <span class="mp-spinner" id="spinner"></span>
                    <span id="generateLabel">✨ Generate</span>
                </button>
            </div>
        </div>

        <!-- Image Upload -->
        <div class="mp-input-section" style="padding: 0;">
            <div class="mp-img-section">
                <div class="mp-img-label">
                    <span>🖼️ Upload Images <span style="font-weight:400;color:#94a3b8;">(optional — shown alongside generated content)</span></span>
                </div>
                <div class="mp-img-grid" id="imgGrid">
                    <div class="mp-img-add" id="imgAddBtn" title="Add images">＋</div>
                </div>
                <input type="file" id="imgFileInput" accept="image/*" multiple style="display:none;">
            </div>
        </div>

        <!-- Output -->
        <div class="mp-output" id="mpOutput">
            <div class="mp-output-title">Generated Content</div>

            <!-- Top row: 公众号 + 小红书 -->
            <div class="mp-top-row">
                <div class="mp-card platform--wechat">
                    <div class="mp-card-header">
                        <div class="mp-card-platform">
                            <div class="mp-platform-icon">💚</div>
                            公众号
                        </div>
                        <button class="mp-copy-btn" data-target="wechatContent">⎘ Copy</button>
                    </div>
                    <div class="mp-card-images" id="wechatImages"></div>
                    <div class="mp-card-body" id="wechatContent"></div>
                    <div class="mp-char-info" id="wechatCount"></div>
                </div>

                <div class="mp-card platform--rednote">
                    <div class="mp-card-header">
                        <div class="mp-card-platform">
                            <div class="mp-platform-icon">🍠</div>
                            小红书
                        </div>
                        <button class="mp-copy-btn" data-target="rednoteContent">⎘ Copy</button>
                    </div>
                    <div class="mp-card-images" id="rednoteImages"></div>
                    <div class="mp-card-body" id="rednoteContent"></div>
                    <div class="mp-char-info" id="rednoteCount"></div>
                </div>
            </div>

            <!-- Bottom row: X -->
            <div class="mp-card platform--x">
                <div class="mp-card-header">
                    <div class="mp-card-platform">
                        <div class="mp-platform-icon">𝕏</div>
                        X (Twitter)
                    </div>
                    <button class="mp-copy-btn" data-target="xContent">⎘ Copy</button>
                </div>
                <div class="mp-card-images" id="xImages"></div>
                <div class="mp-card-body" id="xContent"></div>
                <div class="mp-char-info" id="xCount"></div>
            </div>
        </div>

    </div>

    <script>
        const API = 'https://conference-tracker-production.up.railway.app';
        const ACCOUNTS = {
            yanzhiwang: { name: 'Yanzhiwang', color: '#1d4ed8' },
            embodyx:    { name: 'EmbodyX',    color: '#7c3aed' },
        };

        async function checkAccess() {
            const token = localStorage.getItem('ct_token');
            if (!token) { showGate(); return; }
            try {
                const res = await fetch(API + '/api/auth/me', { headers: { Authorization: 'Bearer ' + token } });
                if (!res.ok) { showGate(); return; }
                const user = await res.json();
                if (user.role !== 'owner' && user.role !== 'admin') { showGate(); return; }
            } catch { showGate(); return; }

            const accKey = localStorage.getItem('pr_account') || 'yanzhiwang';
            const acc = ACCOUNTS[accKey] || ACCOUNTS.yanzhiwang;
            document.getElementById('accountPillName').textContent = acc.name;
            document.getElementById('accountPill').style.background = acc.color;
        }

        function showGate() { document.getElementById('mpGate').classList.add('visible'); }

        checkAccess();

        // Char count
        const articleInput = document.getElementById('articleInput');
        articleInput.addEventListener('input', () => {
            document.getElementById('charCount').textContent = articleInput.value.length + ' characters';
        });

        // Generate
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const article = articleInput.value.trim();
            if (!article) { alert('Please paste an article first.'); return; }

            const btn = document.getElementById('generateBtn');
            const spinner = document.getElementById('spinner');
            const label = document.getElementById('generateLabel');
            btn.disabled = true;
            spinner.style.display = 'block';
            label.textContent = 'Generating…';

            try {
                const token = localStorage.getItem('ct_token');
                const accKey = localStorage.getItem('pr_account') || 'yanzhiwang';
                const acc = ACCOUNTS[accKey] || ACCOUNTS.yanzhiwang;

                const res = await fetch(API + '/api/matrix-publish', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
                    body: JSON.stringify({ article, account: acc.name }),
                });

                const rawText = await res.text();
                if (!res.ok) {
                    let errMsg = `HTTP ${res.status}`;
                    try { errMsg = JSON.parse(rawText).error || errMsg; } catch {}
                    throw new Error(errMsg + '\n\nServer response: ' + rawText.slice(0, 200));
                }

                let data;
                try {
                    data = JSON.parse(rawText);
                } catch {
                    throw new Error('Invalid response from server: ' + rawText.slice(0, 200));
                }

                document.getElementById('wechatContent').textContent = data.wechat || '';
                document.getElementById('rednoteContent').textContent = data.rednote || '';
                document.getElementById('xContent').textContent = data.x || '';

                document.getElementById('wechatCount').textContent = (data.wechat || '').length + ' characters';
                document.getElementById('rednoteCount').textContent = (data.rednote || '').length + ' characters';
                document.getElementById('xCount').textContent = (data.x || '').length + ' / 280 characters';

                updateCardImages();
                document.getElementById('mpOutput').classList.add('visible');
                document.getElementById('mpOutput').scrollIntoView({ behavior: 'smooth', block: 'start' });

            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                btn.disabled = false;
                spinner.style.display = 'none';
                label.textContent = '✨ Generate';
            }
        });

        // ── Image upload ──────────────────────────────────────────
        let uploadedImages = []; // { url, name }

        const imgGrid = document.getElementById('imgGrid');
        const imgAddBtn = document.getElementById('imgAddBtn');
        const imgFileInput = document.getElementById('imgFileInput');

        imgAddBtn.addEventListener('click', () => imgFileInput.click());

        imgFileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const url = URL.createObjectURL(file);
                uploadedImages.push({ url, name: file.name });
                renderImgGrid();
            });
            imgFileInput.value = '';
        });

        function renderImgGrid() {
            // Clear all thumbs (keep add btn)
            imgGrid.innerHTML = '';

            uploadedImages.forEach((img, i) => {
                const thumb = document.createElement('div');
                thumb.className = 'mp-img-thumb';
                thumb.innerHTML = `
                    <img src="${img.url}" alt="${img.name}">
                    <button class="mp-img-remove" data-i="${i}" title="Remove">×</button>
                `;
                imgGrid.appendChild(thumb);
            });

            // Re-add the "+" button
            const addBtn = document.createElement('div');
            addBtn.className = 'mp-img-add';
            addBtn.textContent = '＋';
            addBtn.title = 'Add images';
            addBtn.addEventListener('click', () => imgFileInput.click());
            imgGrid.appendChild(addBtn);

            // Remove handlers
            imgGrid.querySelectorAll('.mp-img-remove').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const i = parseInt(btn.dataset.i);
                    URL.revokeObjectURL(uploadedImages[i].url);
                    uploadedImages.splice(i, 1);
                    renderImgGrid();
                    updateCardImages();
                });
            });

            updateCardImages();
        }

        function updateCardImages() {
            ['wechat', 'rednote', 'x'].forEach(platform => {
                const container = document.getElementById(platform + 'Images');
                if (!container) return;
                container.innerHTML = '';
                if (uploadedImages.length === 0) {
                    container.classList.remove('has-images');
                    return;
                }
                container.classList.add('has-images');
                uploadedImages.forEach(img => {
                    const thumb = document.createElement('div');
                    thumb.className = 'mp-card-img-thumb';
                    thumb.innerHTML = `<img src="${img.url}" alt="${img.name}">`;
                    thumb.title = img.name;
                    container.appendChild(thumb);
                });
            });
        }

        // Copy buttons
        document.querySelectorAll('.mp-copy-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const target = document.getElementById(btn.dataset.target);
                navigator.clipboard.writeText(target.textContent).then(() => {
                    btn.textContent = '✓ Copied';
                    btn.classList.add('copied');
                    setTimeout(() => {
                        btn.textContent = '⎘ Copy';
                        btn.classList.remove('copied');
                    }, 2000);
                });
            });
        });
    </script>
</body>
</html>
